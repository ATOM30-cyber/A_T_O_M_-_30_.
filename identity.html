<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATOM | IDENTITY_CHECK</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .gate-container { border: 1px solid #00ff41; padding: 40px; width: 450px; text-align: center; box-shadow: 0 0 20px #004400; }
        h1 { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 30px; line-height: 1.5; }
        .btn-group { display: flex; justify-content: space-around; margin-top: 20px; }
        button { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px 30px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00ff41; color: #000; }
        input { background: #000; border: none; border-bottom: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 80%; text-align: center; outline: none; margin-top: 20px; display: none; }
        #status { margin-top: 20px; font-size: 0.8rem; min-height: 60px; line-height: 1.6; }
    </style>
</head>
<body>
<div class="gate-container">
    <h1 id="question">DO YOU BELIEVE PRIVACY IS RIGHT FOR EVERYONE?</h1>
    <div class="btn-group" id="actions">
        <button onclick="handleResponse(true)">YES</button>
        <button onclick="handleResponse(false)">NO</button>
    </div>
    <input type="text" id="agentName" placeholder="ENTER AGENT NAME">
    <div id="status">>> AWAITING_LOGIC_SELECTION...</div>
</div>
<script>
    function handleResponse(isBeliever) {
        const actions = document.getElementById('actions');
        const input = document.getElementById('agentName');
        const status = document.getElementById('status');
        actions.style.display = "none";
        input.style.display = "inline-block";
        input.focus();

        input.onkeypress = function(e) {
            if (e.key === 'Enter') {
                const name = input.value.trim();
                if (!name) return;

                if (isBeliever) {
                    let hash = 0x811c9dc5;
                    for (let i = 0; i < name.length; i++) {
                        hash ^= name.charCodeAt(i);
                        hash = Math.imul(hash, 0x01000193);
                    }
                    const systemKey = "AT-" + Math.abs(hash % 999999);
                    const secondaryKey = "jesus2006";

                    status.innerHTML = `>> IDENTITY_CONFIRMED: ${name}<br>
                                       >> SYSTEM_KEY: <span style="color:#fff">${systemKey}</span><br>
                                       >> SECONDARY_KEY: <span style="color:#fff">${secondaryKey}</span><br>
                                       >> REDIRECTING TO VAULT...`;
                    
                    setTimeout(() => {
                        window.location.href = `vault.html?user=${encodeURIComponent(name)}&key=${systemKey}`;
                    }, 5000);
                } else {
                    status.style.color = "red";
                    status.innerHTML = `ACCESS DENIED. SYSTEM LOCKED.`;
                    setTimeout(() => { location.reload(); }, 2000);
                }
            }
        };
    }
</script>
</body>
</html>
