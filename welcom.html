<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATOM | GHOST_CHAT</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .chat-header { padding: 15px; border-bottom: 1px solid #00ff41; text-align: center; font-weight: bold; background: rgba(0,255,65,0.05); letter-spacing: 2px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border: 1px solid #004400; position: relative; border-radius: 2px; line-height: 1.4; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: #001a00; border-color: #00ff41; box-shadow: 0 0 10px rgba(0,255,65,0.1); }
        .msg.received { align-self: flex-start; background: #0a0a0a; border-color: #008f11; }
        .input-area { padding: 20px; border-top: 1px solid #00ff41; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; font-family: 'Courier New', monospace; }
        button { background: #00ff41; color: #000; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        .system-msg { text-align: center; font-size: 0.7rem; color: #008f11; margin: 10px 0; opacity: 0.7; }
        .sender-tag { display: block; font-size: 0.65rem; color: #00ff41; margin-bottom: 4px; font-weight: bold; }
        .rank { color: #888; font-size: 0.55rem; font-weight: normal; margin-left: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="chat-header">ATOM_SECURE_CHANNEL // ENCRYPTION_ACTIVE</div>

<div id="chat-box">
    <div class="system-msg">>> CHANNEL_ESTABLISHED. END-TO-END ENCRYPTION ENABLED.</div>
</div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="TYPE ENCRYPTED MESSAGE..." autocomplete="off">
    <button id="sendBtn">SEND</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. استخراج البيانات من الـ URL مرة واحدة فقط لتجنب الأخطاء
    const params = new URLSearchParams(window.location.search);
    const isAuthorized = params.get('auth');
    const userName = params.get('user') || "Ghost_Agent";

    // 2. التحقق من الصلاحية
    if (isAuthorized !== "true") {
        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%; font-family:monospace;'>ERROR: UNAUTHORIZED_ACCESS. SECURITY_BREACH_DETECTED.</h1>";
        setTimeout(() => {
            window.location.href = "identity.html";
        }, 3000);
    }

    // 3. إعداد Firebase (تأكد من أن هذه البيانات صحيحة من الكونسول الخاص بك)
    const firebaseConfig = {
        apiKey: "AIzaSyBp8XVk_7Ga-RCq-p8qGbDE0RYk4F7Nv-A", 
        authDomain: "atom-project-b365a.firebaseapp.com",
        databaseURL: "https://atom-project-b365a-default-rtdb.firebaseio.com",
        projectId: "atom-project-b365a",
        storageBucket: "atom-project-b365a.appspot.com",
        messagingSenderId: "1091970425286",
        appId: "1:1091970425286:web:accf6681e33115f8d3d2c7"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 4. دالة الإرسال
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text) return;

        // تشفير بسيط (Base64)
        const encrypted = btoa(unescape(encodeURIComponent(text))); 

        database.ref('messages/').push({
            user: userName,
            content: encrypted,
            time: Date.now()
        });

        input.value = '';
    }

    // 5. استلام الرسائل
    database.ref('messages/').limitToLast(20).on('child_added', (snapshot) => {
        const data = snapshot.val();
        try {
            // فك التشفير
            const decrypted = decodeURIComponent(escape(atob(data.content)));
            appendMessage(decrypted, data.user === userName ? 'sent' : 'received', data.user);
        } catch(e) {
            console.error("Decryption error", e);
        }
    });

    // 6. عرض الرسائل في الواجهة
    function appendMessage(text, type, sender) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        
        msgDiv.innerHTML = `
            <span class="sender-tag">
                ${sender}<span class="rank">[Agent]</span>
            </span>
            ${text}
        `;
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // مستمعات الأحداث (Events)
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
