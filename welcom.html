<!DOCTYPE html>
<html lang="en">
<script>
    // --- ACCESS_CONTROL_PROTOCOL ---
    const urlParams = new URLSearchParams(window.location.search);
    const hasAuth = urlParams.get('auth') === 'true';
    if (sessionStorage.getItem("ATOM_ACCESS_TOKEN") !== "VERIFIED_USER_30" && !hasAuth) {
        window.location.href = "index.html"; 
    }
</script>
<head>
    <meta charset="UTF-8">
    <title>ATOM | GHOST_CHAT_V3</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .chat-header { padding: 15px; border-bottom: 1px solid #00ff41; text-align: center; font-weight: bold; background: rgba(0,255,65,0.05); letter-spacing: 2px; position: relative; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        #user-count { position: absolute; right: 20px; font-size: 0.7rem; color: #ff0000; display: none; text-shadow: 0 0 5px #ff0000; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 15px; border: 1px solid #004400; position: relative; border-radius: 2px; font-size: 0.95rem; }
        .msg.sent { align-self: flex-end; background: rgba(0, 26, 0, 0.8); border-color: #00ff41; }
        .msg.received { align-self: flex-start; background: rgba(5, 5, 5, 0.9); border-color: #004400; }
        .sender-tag { display: block; font-size: 0.7rem; color: #008f11; margin-bottom: 4px; font-weight: bold; cursor: pointer; }
        .rank { color: #fff; margin-left: 5px; font-size: 0.6rem; border: 1px solid #fff; padding: 0 3px; text-transform: uppercase; }
        .rank.founder { color: #ff0000; border-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
        .sender-tag.founder-name { color: #ff0000 !important; text-shadow: 0 0 8px #ff0000; }
        .msg-actions { display: none; position: absolute; top: -12px; right: 5px; gap: 4px; background: #000; }
        .msg:hover .msg-actions { display: flex; }
        .action-btn { background: #000; border: 1px solid #00ff41; color: #00ff41; font-size: 9px; cursor: pointer; border-radius: 2px; }
        .action-btn:hover { background: #00ff41; color: #000; }
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #004400; background: #050505; }
        input { flex: 1; background: #000; border: 1px solid #004400; color: #00ff41; padding: 12px; outline: none; border-radius: 0; }
        input:focus { border-color: #00ff41; }
        button#sendBtn { background: #00ff41; color: #000; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button#sendBtn:hover { background: #00cc33; }
    </style>
</head>
<body>
    <audio id="snd-send" src="https://www.soundjay.com/communication/sounds/typewriter-key-1.mp3"></audio>
    <audio id="snd-recv" src="https://www.soundjay.com/communication/sounds/beep-07.mp3"></audio>

    <div class="chat-header">>> ATOM_GHOST_NETWORK <span id="user-count">CORE_LOAD: 0/100</span></div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="ENTER_DATA..." autocomplete="off">
        <button id="sendBtn">EXECUTE</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBp8XVk_7Ga-RCq-p8qGbDE0RYk4F7Nv-A",
            authDomain: "atom-project-b365a.firebaseapp.com",
            databaseURL: "https://atom-project-b365a-default-rtdb.firebaseio.com",
            projectId: "atom-project-b365a",
            storageBucket: "atom-project-b365a.firebasestorage.app",
            messagingSenderId: "1091970425286",
            appId: "1:1091970425286:web:accf6681e33115f8d3d2c7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userName = urlParams.get('user') || "Unknown_Agent";
        const isFounder = (userName === "Detective 001");

        if (isFounder) document.getElementById('user-count').style.display = "inline";

        // ONLINE TRACKING
        const uCN = userName.replace(/\s/g, '_');
        database.ref('active_users/' + uCN).set({ name: userName });
        database.ref('active_users/' + uCN).onDisconnect().remove();

        database.ref('active_users').on('value', (s) => {
            const count = s.numChildren();
            document.getElementById('user-count').innerText = `CORE_LOAD: ${count}/100`;
        });

        // AUDIO TRIGGER
        function playSnd(id) {
            const aud = document.getElementById(id);
            aud.volume = 0.2;
            aud.play().catch(() => {});
        }

        // RANK SYSTEM
        function setRank(targetName) {
            if (!isFounder) return;
            const rank = prompt(`Set rank for ${targetName}:`);
            if (rank) database.ref('user_ranks/' + targetName.replace(/\s/g, '_')).set(rank.toUpperCase());
        }

        // SENDING LOGIC
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // COMMANDS
            if (isFounder && text === "/clear") {
                database.ref('messages/').remove();
                input.value = '';
                return;
            }

            playSnd('snd-send');
            const encrypted = btoa(unescape(encodeURIComponent(text))); 
            database.ref('messages/').push({ user: userName, content: encrypted, time: Date.now() });
            input.value = '';
        }

        // MESSAGE LISTENER
        database.ref('messages/').limitToLast(50).on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (data.user !== userName) playSnd('snd-recv');

            database.ref('user_ranks/' + data.user.replace(/\s/g, '_')).once('value', (rankSnap) => {
                const userRank = rankSnap.val() || "AGENT";
                try {
                    const dec = decodeURIComponent(escape(atob(data.content)));
                    appendMessage(dec, data.user === userName ? 'sent' : 'received', data.user, snapshot.key, userRank);
                } catch(e) {}
            });
        });

        database.ref('messages/').on('child_removed', () => { location.reload(); });

        function appendMessage(text, type, sender, msgId, currentRank) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            
            let displayRank = (sender === "Detective 001") ? "FOUNDER" : currentRank;
            let rankClass = (sender === "Detective 001") ? "founder" : "custom";
            let nameClass = (sender === "Detective 001") ? "founder-name" : "";

            let actions = '<div class="msg-actions">';
            if (type === 'sent' || isFounder) actions += `<button class="action-btn" onclick="database.ref('messages/${msgId}').remove()">DEL</button>`;
            if (isFounder && type === 'received') actions += `<button class="action-btn" onclick="database.ref('active_users/${sender.replace(/\s/g,'_')}').remove()">KICK</button>`;
            actions += '</div>';

            msgDiv.innerHTML = `${actions}<span class="sender-tag ${nameClass}" onclick="setRank('${sender}')">${sender}<span class="rank ${rankClass}">[${displayRank}]</span></span><span>${text}</span>`;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
