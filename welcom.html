<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATOM | GHOST_NETWORK_V6</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .h { padding: 15px; border-bottom: 1px solid #00ff41; display: flex; justify-content: space-between; background: rgba(0,255,65,0.05); font-size: 0.9rem; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 10px; border: 1px solid #111; position: relative; transition: 0.3s; word-wrap: break-word; }
        .sent { align-self: flex-end; border-left: 3px solid #00ff41; background: rgba(0,255,65,0.02); }
        .received { align-self: flex-start; border-left: 3px solid #333; }
        .tag { display: block; font-size: 0.7rem; margin-bottom: 5px; font-weight: bold; cursor: pointer; }
        
        .rank-founder { color: #ff0000 !important; text-shadow: 0 0 8px #ff0000; }
        .rank-tester { color: #ffd700 !important; text-shadow: 0 0 8px #ffd700; }
        .rank-agent { color: #00ff41 !important; }
        
        .rank-label { font-size: 0.6rem; border: 1px solid currentColor; padding: 0 4px; margin-left: 5px; border-radius: 3px; }
        .sys-msg { color: #555; font-size: 0.7rem; text-align: center; font-style: italic; margin: 5px 0; }
        
        .chat-img { max-width: 100%; max-height: 250px; border: 1px solid #00ff41; margin-top: 5px; border-radius: 4px; }
        .file-link { display: inline-flex; align-items: center; color: #ffd700; text-decoration: none; border: 1px dashed #ffd700; padding: 5px 10px; margin-top: 5px; font-size: 0.8rem; }

        .actions { display: none; position: absolute; top: -15px; right: 0; background: #000; padding: 2px; border: 1px solid #00ff41; gap: 5px; z-index: 10; }
        .msg:hover .actions { display: flex; }
        .act-btn { border: none; color: #00ff41; font-size: 10px; cursor: pointer; background: transparent; font-family: monospace; }
        .act-btn:hover { background: #00ff41; color: #000; }

        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #004400; background: #000; }
        input[type="text"] { flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; }
        #sb { background: #00ff41; color: #000; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }
        #file-btn { background: #111; color: #00ff41; border: 1px solid #00ff41; padding: 0 15px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="h">
        <span>>> NODE: ACTIVE_SECTOR</span>
        <span id="uc" style="color:#ff0000;">LOAD: 0/100</span>
    </div>
    
    <div id="chat-box"></div>

    <div class="input-area">
        <input type="file" id="file-input" style="display:none" onchange="uploadFile(this.files[0])">
        <button id="file-btn" onclick="document.getElementById('file-input').click()">+</button>
        <input type="text" id="mi" placeholder="TYPE_COMMAND_OR_DATA..." autocomplete="off">
        <button id="sb">SEND</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

    <script>
        const config = { 
            apiKey: "AIzaSyBp8XVk_7Ga-RCq-p8qGbDE0RYk4F7Nv-A", 
            databaseURL: "https://atom-project-b365a-default-rtdb.firebaseio.com", 
            projectId: "atom-project-b365a",
            storageBucket: "atom-project-b365a.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();
        
        const params = new URLSearchParams(window.location.search);
        const uN = params.get('user') || "Unknown";
        const isF = (uN === "Detective 001");
        let fId = localStorage.getItem('ATOM_FID') || 'HID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('ATOM_FID', fId);

        db.ref('blacklist').on('value', s => {
            const list = s.val() || {};
            if (list[uN.replace(/\s/g, '_')] || list[fId]) {
                window.location.href = "identity.html";
            }
        });

        if (!isF) {
            const onlineRef = db.ref('online/' + uN.replace(/\s/g, '_'));
            onlineRef.set(true);
            onlineRef.onDisconnect().remove();
        }
        db.ref('online').on('value', s => { document.getElementById('uc').innerText = `LOAD: ${s.numChildren()}/100`; });

        function uploadFile(file) {
            if(!file) return;
            const storageRef = storage.ref(`ghost_files/${Date.now()}_${file.name}`);
            const uploadTask = storageRef.put(file);
            uploadTask.on('state_changed', null, null, () => {
                uploadTask.snapshot.ref.getDownloadURL().then((url) => {
                    db.ref('msgs').push({ u: uN, fid: fId, ts: Date.now(), fileUrl: url, fileName: file.name, fileType: file.type });
                });
            });
        }

        function send() {
            const i = document.getElementById('mi'), t = i.value.trim();
            if(!t) return;
            if(isF && t==="/clear") { db.ref('msgs').remove(); i.value=''; return; }
            const e = btoa(unescape(encodeURIComponent(t)));
            db.ref('msgs').push({ u: uN, c: e, fid: fId, ts: Date.now() });
            i.value = '';
        }

        db.ref('msgs').limitToLast(40).on('child_added', s => {
            const d = s.val();
            const box = document.getElementById('chat-box');
            if(d.sys) {
                box.innerHTML += `<div class="sys-msg">${d.sys}</div>`;
                box.scrollTop = box.scrollHeight;
                return;
            }

            db.ref('ranks/'+d.u.replace(/\s/g,'_')).once('value', rS => {
                const r = rS.val() || "AGENT";
                const div = document.createElement('div');
                div.className = `msg ${d.u === uN ? 'sent' : 'received'}`;
                
                let rClass = "rank-agent", rName = "AGENT";
                if(d.u === "Detective 001") { rClass = "rank-founder"; rName = "FOUNDER"; }
                else if(r === "TESTER") { rClass = "rank-tester"; rName = "TESTER"; }

                let contentHTML = "";
                let dec = "";
                if(d.fileUrl) {
                    if(d.fileType.startsWith('image/')) {
                        contentHTML = `<a href="${d.fileUrl}" target="_blank"><img src="${d.fileUrl}" class="chat-img"></a>`;
                    } else {
                        contentHTML = `<a href="${d.fileUrl}" target="_blank" class="file-link">📁 ${d.fileName}</a>`;
                    }
                } else {
                    dec = decodeURIComponent(escape(atob(d.c)));
                    contentHTML = `<span>${dec}</span>`;
                }

                let actions = `<div class="actions">`;
                if(!d.fileUrl && (isF || d.u === uN)) actions += `<button class="act-btn" onclick="editMsg('${s.key}','${dec}')">EDIT</button>`;
                if(isF) {
                    actions += `<button class="act-btn" style="color:red" onclick="firebase.database().ref('msgs/${s.key}').remove()">DEL</button>`;
                    actions += `<button class="act-btn" style="color:#ff0000;" onclick="kickUser('${d.u}', '${d.fid}')">BAN</button>`;
                }
                actions += `</div>`;

                div.innerHTML = `${actions}<span class="tag ${rClass}" onclick="setRank('${d.u}')">${d.u}<span class="rank-label">[${rName}]</span></span>${contentHTML}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        });

        function editMsg(id, oldText) {
            const nt = prompt("EDIT:", oldText);
            if(nt) db.ref('msgs/'+id).update({ c: btoa(unescape(encodeURIComponent(nt))) });
        }

        function kickUser(target, targetFid) {
            if(!isF) return;
            if(confirm("BAN " + target + "?")) {
                if(targetFid) db.ref('blacklist/' + targetFid).set(true);
                db.ref('blacklist/' + target.replace(/\s/g, '_')).set(true);
            }
        }

        window.setRank = (t) => {
            if(!isF) return;
            const nr = prompt(`RANK ${t}:`).toUpperCase();
            if(nr) db.ref('ranks/'+t.replace(/\s/g,'_')).set(nr);
        };

        db.ref('msgs').on('child_removed', () => { location.reload(); });
        db.ref('msgs').on('child_changed', () => { location.reload(); });
        document.getElementById('sb').onclick = send;
        document.getElementById('mi').onkeypress = e => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
